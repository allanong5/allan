<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOGOKIDS 官方网站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .red-glow { border: 2px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center bg-slate-900">
        <div class="flex items-center gap-4">
            <img src="https://images2.imgbox.com/3e/2d/7Uj1fFvE_o.png" alt="Avatar" class="w-12 h-12 rounded-full border-2 border-red-500">
            <span class="text-2xl font-black italic text-red-500 tracking-tighter uppercase">Gogokids</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-16 px-6 text-center">
        <h1 class="text-6xl font-black italic mb-4 uppercase">弹头小子 <span class="text-red-500">Bullet Boy</span></h1>
        <p class="text-gray-400 text-lg mb-10">14岁机甲少年与他的机械犬 Hero</p>
        
        <div class="mb-16">
            <img src="https://images2.imgbox.com/5c/4b/T8oY2r6l_o.jpg" alt="Character View" class="w-full max-w-4xl mx-auto rounded-3xl red-glow shadow-2xl">
        </div>

        <div class="grid md:grid-cols-2 gap-8 text-left">
            <div class="bg-slate-900 p-8 rounded-2xl border border-gray-800 hover:border-red-500 transition">
                <h2 class="text-2xl font-bold text-red-500 mb-3">弹头 (Bullet Boy)</h2>
                <p class="text-gray-400">热血少年机甲师，头戴红色头盔，胸口有标志性口袋设计。</p>
            </div>
            <div class="bg-slate-900 p-8 rounded-2xl border border-gray-800 hover:border-red-500 transition">
                <h2 class="text-2xl font-bold text-red-500 mb-3">Hero</h2>
                <p class="text-gray-400">高智能机械犬，拥有带红球的直尾巴，是最可靠的伙伴。</p>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-600 border-t border-gray-900">
        <p>© 2026 GOGOKIDS IP Project</p>
    </footer>
</body>
</html>
